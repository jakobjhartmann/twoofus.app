			<path d="M30 40 L32.4 47.6 L40 50 L32.4 52.4 L30 60 L27.6 52.4 L20 50 L27.6 47.6 Z" opacity=".8"/>
			<path d="M168 76 L170 82 L176 84 L170 86 L168 92 L166 86 L160 84 L166 82 Z" opacity=".7"/>
			<path d="M162 26 L163.6 31 L168.6 32.6 L163.6 34.2 L162 39.2 L160.4 34.2 L155.4 32.6 L160.4 31 Z" opacity=".6"/>
			<path d="M22 120 L23.6 125 L28.6 126.6 L23.6 128.2 L22 133.2 L20.4 128.2 L15.4 126.6 L20.4 125 Z" opacity=".6"/>
		</g>
	</g>
</svg>
