			<path d="M78 40 Q100 30 122 40"/>
			<path d="M70 62 Q100 50 130 62"/>
			<path d="M66 86 Q100 73 134 86"/>
		</g>
		<!-- kraft cone -->
		<path d="M62 140 L138 140 L122 210 Q100 216 78 210 Z" fill="#E0C3A0"/>
		<path d="M62 140 L100 140 L100 210 Q88 213 78 210 Z" fill="#D4B28C" opacity=".55"/>
		<!-- bow + tails -->
		<path d="M84 146 q16 -10 32 0 q-16 10 -32 0" fill="#C26F82"/>
		<circle cx="100" cy="146" r="3.4" fill="#9A4E6B"/>
		<path d="M96 152 q-6 14 2 24" stroke="#C26F82" stroke-width="2.4" fill="none" stroke-linecap="round"/>
		<path d="M106 152 q7 12 1 22" stroke="#C26F82" stroke-width="2.4" fill="none" stroke-linecap="round"/>
